name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Restore
        run: dotnet restore SysAnalyzer/SysAnalyzer.sln

      - name: Build
        run: dotnet build SysAnalyzer/SysAnalyzer.sln -c Release --no-restore

      - name: Test
        run: dotnet test SysAnalyzer/SysAnalyzer.Tests/SysAnalyzer.Tests.csproj -c Release --no-build --verbosity normal --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: SysAnalyzer/SysAnalyzer.Tests/TestResults/results.trx
